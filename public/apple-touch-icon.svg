<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1f29"/>
      <stop offset="100%" stop-color="#282a36"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <linearGradient id="areaA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="areaB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8be9fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8be9fd" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- dotted grid -->
  <g fill="#44475a">
    <g>
      <circle cx="30"  cy="55"  r="1"/><circle cx="60"  cy="55"  r="1"/><circle cx="90"  cy="55"  r="1"/><circle cx="120" cy="55"  r="1"/><circle cx="150" cy="55"  r="1"/>
      <circle cx="30"  cy="85"  r="1"/><circle cx="60"  cy="85"  r="1"/><circle cx="90"  cy="85"  r="1"/><circle cx="120" cy="85"  r="1"/><circle cx="150" cy="85"  r="1"/>
      <circle cx="30"  cy="115" r="1"/><circle cx="60"  cy="115" r="1"/><circle cx="90"  cy="115" r="1"/><circle cx="120" cy="115" r="1"/><circle cx="150" cy="115" r="1"/>
      <circle cx="30"  cy="145" r="1"/><circle cx="60"  cy="145" r="1"/><circle cx="90"  cy="145" r="1"/><circle cx="120" cy="145" r="1"/><circle cx="150" cy="145" r="1"/>
    </g>
  </g>

  <!-- lower line (cyan→green, gentle) area + line -->
  <path
    d="M 20,130 L 40,124 L 60,128 L 80,118 L 100,122 L 120,112 L 140,116 L 160,108 L 160,150 L 20,150 Z"
    fill="url(#areaB)"/>
  <polyline
    points="20,130 40,124 60,128 80,118 100,122 120,112 140,116 160,108"
    fill="none" stroke="url(#line2)" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.9"/>

  <!-- upper line (purple→pink, dramatic) area + glow + line -->
  <path
    d="M 20,108 L 40,100 L 55,104 L 72,78 L 90,84 L 108,54 L 128,72 L 148,42 L 160,58 L 160,150 L 20,150 Z"
    fill="url(#areaA)"/>
  <polyline
    points="20,108 40,100 55,104 72,78 90,84 108,54 128,72 148,42 160,58"
    fill="none" stroke="url(#line1)" stroke-width="11"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.5" filter="url(#glow)"/>
  <polyline
    points="20,108 40,100 55,104 72,78 90,84 108,54 128,72 148,42 160,58"
    fill="none" stroke="url(#line1)" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- peak -->
  <circle cx="148" cy="42" r="12" fill="#ff79c6" opacity="0.28"/>
  <circle cx="148" cy="42" r="6.5" fill="#ff79c6"/>
  <circle cx="148" cy="42" r="2.5" fill="#f8f8f2"/>
</svg>
